<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>割り勘計算</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="calculator" aria-labelledby="app-title">
      <div class="heading">
        <p class="eyebrow">Warikan</p>
        <h1 id="app-title">割り勘計算</h1>
      </div>

      <form class="form" id="warikan-form">
        <label class="field">
          <span>合計金額</span>
          <div class="input-wrap">
            <input id="total" type="number" min="0" inputmode="numeric" placeholder="例: 12000">
            <span>円</span>
          </div>
        </label>

        <label class="field">
          <span>人数</span>
          <div class="input-wrap">
            <input id="people" type="number" min="1" inputmode="numeric" placeholder="例: 4">
            <span>人</span>
          </div>
        </label>

        <button type="submit">計算する</button>
      </form>

      <section class="result" aria-live="polite">
        <p>一人あたり</p>
        <strong id="amount-per-person">-- 円</strong>
        <span id="detail">金額と人数を入力してください</span>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
